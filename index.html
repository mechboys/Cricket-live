<!DOCTYPE html>
<html>
<head>
  <title>Village Cricket Live</title>
</head>
<body style="background:black;color:white;text-align:center;font-family:sans-serif;">

<h1>🏏 Live Score</h1>
<h2 id="score">0 / 0</h2>

<input id="key" placeholder="Admin key">
<br><br>

<button onclick="run(0)">0</button>
<button onclick="run(1)">1</button>
<button onclick="run(2)">2</button>
<button onclick="run(4)">4</button>
<button onclick="run(6)">6</button>
<button onclick="wicket()">W</button>
<button onclick="extra()">WD/NB</button>

<!-- Firebase scripts -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBtYVVn9kmsRO1Gtww5Tu4pvNI-X5d7wjA",
  authDomain: "cricket-live-46a37.firebaseapp.com",
  databaseURL: "https://cricket-live-46a37-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "cricket-live-46a37",
  storageBucket: "cricket-live-46a37.firebasestorage.app",
  messagingSenderId: "307426836372",
  appId: "1:307426836372:web:6a4b9404bdcd75c81e9981"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let runs = 0;
let wickets = 0;

// Read live data
db.ref("match").on("value", snap => {
  let d = snap.val();
  if(d){
    document.getElementById("score").innerText =
      d.runs + " / " + d.wickets;
  }
});

// Admin check
function admin(){
  return document.getElementById("key").value === "1234";
}

// Add runs
function run(r){
  if(!admin()) return alert("No access");
  runs += r;
  update();
}

// Wicket
function wicket(){
  if(!admin()) return alert("No access");
  wickets++;
  update();
}

// Extra (no runs added)
function extra(){
  if(!admin()) return alert("No access");
  update();
}

// Update database
function update(){
  db.ref("match").set({
    runs: runs,
    wickets: wickets
  });
}
</script>

</body>
</html>
