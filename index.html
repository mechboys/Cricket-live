<!DOCTYPE html>
<html>
<head>
  <title>Village Cricket Live</title>
</head>

<body style="background:black;color:white;text-align:center;font-family:sans-serif;">

<!-- LOGIN SCREEN -->
<div id="loginPage">
  <h2>Enter Admin Pin</h2>
  <input id="key" placeholder="Enter Pin">
  <p id="error" style="color:red;"></p>
</div>

<!-- ADMIN SCREEN -->
<div id="adminPage" style="display:none;">
  <h1>🏏 Live Score</h1>
  <h2 id="score">Loading...</h2>

  <button onclick="run(0)">0</button>
  <button onclick="run(1)">1</button>
  <button onclick="run(2)">2</button>
  <button onclick="run(4)">4</button>
  <button onclick="run(6)">6</button>
  <button onclick="wicket()">W</button>
  <button onclick="extra()">WD/NB</button>
</div>

<!-- Firebase scripts -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBtYVVn9kmsRO1Gtww5Tu4pvNI-X5d7wjA",
  authDomain: "cricket-live-46a37.firebaseapp.com",
  databaseURL: "https://cricket-live-46a37-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "cricket-live-46a37",
  storageBucket: "cricket-live-46a37.firebasestorage.app",
  messagingSenderId: "307426836372",
  appId: "1:307426836372:web:6a4b9404bdcd75c81e9981"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let runs = 0;
let wickets = 0;

// Load data
db.ref("match").on("value", snap => {
  let d = snap.val();
  if(d){
    runs = d.runs || 0;
    wickets = d.wickets || 0;
  }
  document.getElementById("score").innerText =
    runs + " / " + wickets;
});

// Auto login when typing PIN
document.getElementById("key").addEventListener("input", function(){
  if(this.value === "1234"){
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("adminPage").style.display = "block";
  } else {
    document.getElementById("error").innerText = "Wrong Pin";
  }
});

// Add runs
function run(r){
  runs += r;
  update();
}

// Wicket
function wicket(){
  wickets++;
  update();
}

// Extra (no runs added)
function extra(){
  update();
}

// Update database
function update(){
  db.ref("match").set({
    runs: runs,
    wickets: wickets
  });
}
</script>

</body>
</html>
